name: KubePilot CI


on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout du code source
      uses: actions/checkout@v3

    - name: 🐍 Configuration de Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip' 

    - name: 📦 Installation des dépendances
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 🔍 Vérification de la syntaxe (Linter Flake8)
      run: |
        # Arrête le build s'il y a des erreurs de syntaxe fatales ou des variables non définies
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Vérification standard pour garder un code propre
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: 🐳 Test de construction Docker
      run: |
        docker build -t kubepilot-test .
